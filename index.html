<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전 탐험대 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #ffffff; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #ddd; padding: 30px; background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px); background-size: 30px 30px; }
        .module { background: white; padding: 20px; margin-bottom: 20px; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .btn-video { display: inline-block; padding: 10px; background: #f8f9fa; border: 1px solid #ccc; text-decoration: none; color: #333; margin-bottom: 5px; }
        .btn-quiz { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; display: block; width: 100%; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 400px; border: 2px solid #333; text-align: center; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 5px 0; background: #f9f9f9; border: 1px solid #ccc; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 안전 탐험대 퀴즈</h1>
    <div id="modules"></div>
</div>

<div id="quizModal" class="modal">
    <div class="modal-content">
        <h2 id="quizTitle">퀴즈</h2>
        <p id="quizQuestion" style="font-size: 1.2em; font-weight: bold;"></p>
        <div id="options"></div>
        <p id="resultText" style="font-weight: bold; margin-top:10px;"></p>
        <p id="hint" style="color: #e74c3c; font-weight: bold;"></p>
    </div>
</div>

<script>
const quizData = {
    1: [
        {q: "소화기 안전핀은 평소에 뽑아두는 것이 좋다?", a: "X", h: "안전핀은 사용할 때만 뽑아야 안전해요!"},
        {q: "소화기를 사용할 때는 바람을 등지고 서야 한다?", a: "O", h: "바람을 마주 보고 뿌리면 약제가 나에게 돌아와요."},
        {q: "식용유 화재 시 물을 부어 끄는 것이 좋다?", a: "X", h: "기름과 물이 만나면 폭발적으로 튀어 올라 위험해요!"},
        {q: "소화기 손잡이를 잡을 때는 힘껏 움켜쥐어야 한다?", a: "O", h: "손잡이를 끝까지 움켜쥐어야 약제가 발사됩니다."},
        {q: "소화기는 햇빛이나 습기가 없는 곳에 보관한다?", a: "O", h: "습기가 있거나 직사광선이 닿으면 소화기가 고장 날 수 있어요."},
        {q: "소화기 노즐은 불꽃을 향해 빗자루 쓸듯 분사한다?", a: "O", h: "골고루 덮어 끄기 위해 좌우로 움직여야 합니다."},
        {q: "소화기 분말은 인체에 매우 해롭다?", a: "X", h: "소화기 분말은 인체에 무해하도록 만들어졌습니다."},
        {q: "화재 시 소화기를 가장 먼저 찾는다?", a: "O", h: "초기 화재는 소화기 1대가 소방차 1대와 같은 역할을 해요!"},
        {q: "소화기는 어린이 혼자 사용해도 된다?", a: "X", h: "어린이는 먼저 안전한 곳으로 대피하는 것이 중요합니다!"},
        {q: "소화기에도 유통기한(교체 시기)이 있다?", a: "O", h: "오래된 소화기는 약제가 굳을 수 있어 정기 점검이 필요해요."}
    ],
    2: [
        {q: "불이 나면 엘리베이터를 타고 대피한다?", a: "X", h: "정전 시 갇힐 위험이 크니 반드시 계단을 이용하세요!"},
        {q: "화재 신고 시 정확한 주소를 말해야 한다?", a: "O", h: "주소를 정확히 알아야 소방차가 빠르게 올 수 있어요."},
        {q: "불이야! 하고 크게 외쳐 주변에 알린다?", a: "O", h: "주변 사람들에게 불이 났음을 알려 모두 대피하게 해야 해요."},
        {q: "119 신고 후 소방관이 끊기 전까지 끊지 않는다?", a: "O", h: "소방관이 상황을 모두 파악할 때까지 통화를 유지하세요."},
        {q: "공중전화에서는 동전이 없어도 119 신고가 된다?", a: "O", h: "공중전화의 긴급 통화 버튼을 누르면 동전 없이도 신고 가능해요!"},
        {q: "휴대폰 잠금 상태에서도 119 신고는 가능하다?", a: "O", h: "잠금 화면의 '긴급전화' 기능을 이용하세요!"},
        {q: "집 안의 모든 문을 다 열어놓고 대피한다?", a: "X", h: "연기 확산을 막기 위해 문을 닫고 나와야 합니다."},
        {q: "대피 시 엘리베이터 버튼을 눌러두고 기다린다?", a: "X", h: "화재 시 엘리베이터는 절대 금지! 계단으로 가세요."},
        {q: "화재 발생 시 가장 먼저 비상벨을 누른다?", a: "O", h: "비상벨을 눌러 건물 전체에 화재를 알려야 합니다."},
        {q: "대피할 때는 낮은 자세로 이동한다?", a: "O", h: "연기는 위로 올라가므로 바닥으로 이동해야 합니다."}
    ],
    3: [
        {q: "화재 시 불꽃보다 연기가 더 위험하다?", a: "O", h: "연기는 유독해서 조금만 마셔도 의식을 잃을 수 있어요."},
        {q: "연기 속을 지나갈 때는 서서 뛰어가야 한다?", a: "X", h: "서서 가면 연기를 직접 마시게 되니 무릎을 굽히세요!"},
        {q: "수건은 물에 적셔서 입과 코를 막아야 한다?", a: "O", h: "젖은 수건은 연기를 걸러주는 필터 역할을 합니다."},
        {q: "대피할 때 무릎을 대고 기어가야 한다?", a: "O", h: "바닥에서 10~20cm 위에는 깨끗한 공기가 남아있어요."},
        {q: "문을 열기 전 손잡이가 뜨거운지 확인한다?", a: "O", h: "손잡이가 뜨겁다는 건 반대편에 불이 아주 가깝다는 신호예요!"},
        {q: "연기가 들어오지 못하게 문틈을 막는 것은 도움이 된다?", a: "O", h: "젖은 옷이나 수건으로 틈새를 막아 연기를 차단하세요."},
        {q: "연기가 가득하면 창문을 모두 열어 환기한다?", a: "X", h: "외부 공기가 들어와 불길이 순식간에 커질 수 있어요!"},
        {q: "대피 시 가방이나 짐을 챙겨서 나간다?", a: "X", h: "생명이 제일 중요합니다! 짐은 두고 몸만 빠르게 탈출하세요."},
        {q: "벽을 짚을 때는 손등으로 짚고 이동한다?", a: "O", h: "손바닥을 데지 않기 위해 손등으로 벽을 확인하며 이동하세요."},
        {q: "구조 요청 시 밝은 색 옷을 흔든다?", a: "O", h: "밝은 색은 소방관의 눈에 가장 잘 띄기 때문입니다."}
    ]
};

let currentSet = 0, currentIndex = 0;

function openQuiz(set) {
    currentSet = set; currentIndex = 0;
    document.getElementById('quizModal').style.display = 'flex';
    showQuestion();
}

function showQuestion() {
    let qData = quizData[currentSet][currentIndex];
    document.getElementById('quizTitle').innerText = (currentIndex + 1) + "번 문제";
    document.getElementById('quizQuestion').innerText = qData.q;
    document.getElementById('resultText').innerText = "";
    document.getElementById('hint').innerText = ""; 
    let optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = "";
    ['O', 'X'].forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(userAns) {
    let qData = quizData[currentSet][currentIndex];
    if(userAns == qData.a) {
        document.getElementById('resultText').style.color = "green";
        document.getElementById('resultText').innerText = "정답입니다!";
        document.getElementById('hint').innerText = ""; 
        setTimeout(() => {
            currentIndex++;
            if(currentIndex < 10) showQuestion();
            else { alert("축하합니다! 모두 완료했습니다."); closeModal(); }
        }, 1000);
    } else {
        document.getElementById('resultText').style.color = "red";
        document.getElementById('resultText').innerText = "틀렸습니다!";
        document.getElementById('hint').innerText = "힌트: " + qData.h;
    }
}

function closeModal() { document.getElementById('quizModal').style.display = 'none'; }

const titles = ["소화기 사용법", "어린이 행동요령", "불보다 무서운 연기"];
const urls = ["2553", "2880", "1194"];
document.getElementById('modules').innerHTML = titles.map((t, i) => 
    `<div class="module"><h2>${i+1}. ${t}</h2>
    <a href="https://www.safetv.go.kr/base/video/view?idx=${urls[i]}" target="_blank" class="btn-video">▶ 영상 다시보기</a>
    <button class="btn-quiz" onclick="openQuiz(${i+1})">문제 풀어보기</button></div>`
).join('');
</script>

</body>
</html>
